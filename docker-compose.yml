services:
  postgres1:
    image: postgres:16
    environment:
      POSTGRES_DB: statusdb
      POSTGRES_USER: statususer
      POSTGRES_PASSWORD: statuspass
    volumes:
      - pgdata1:/var/lib/postgresql/data

  postgres2:
    image: postgres:16
    environment:
      POSTGRES_DB: statusdb
      POSTGRES_USER: statususer
      POSTGRES_PASSWORD: statuspass
    volumes:
      - pgdata2:/var/lib/postgresql/data

  postgres3:
    image: postgres:16
    environment:
      POSTGRES_DB: statusdb
      POSTGRES_USER: statususer
      POSTGRES_PASSWORD: statuspass
    volumes:
      - pgdata3:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3
    volumes:
      - ./src/main/resources/certs/rabbitmq:/etc/rabbitmq/certs:ro
      - ./src/main/resources/certs/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro

  status-gateway:
    image: nginx:1.27-alpine
    depends_on:
      - status-server-1
      - status-server-2
      - status-server-3
    ports:
      - "127.0.0.1:8440:8440"
    volumes:
      - ./src/main/resources/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/main/resources/certs/status-server.crt:/etc/nginx/status-server.crt:ro

  status-server-1:
    image: status-server:local
    build: .
    pull_policy: build
    depends_on:
      - postgres1
      - rabbitmq
    environment:
      APP_NODE_ID: node-1
      APP_PEER_BASE_URLS: https://status-server-2:8443,https://status-server-3:8443
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres1:5432/statusdb
      SPRING_DATASOURCE_USERNAME: statususer
      SPRING_DATASOURCE_PASSWORD: statuspass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5671
      JAVA_TOOL_OPTIONS: -Djavax.net.ssl.trustStore=/app/certs/status-server-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12

  status-server-2:
    image: status-server:local
    pull_policy: never
    depends_on:
      - postgres2
      - rabbitmq
    environment:
      APP_NODE_ID: node-2
      APP_PEER_BASE_URLS: https://status-server-1:8443,https://status-server-3:8443
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres2:5432/statusdb
      SPRING_DATASOURCE_USERNAME: statususer
      SPRING_DATASOURCE_PASSWORD: statuspass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5671
      JAVA_TOOL_OPTIONS: -Djavax.net.ssl.trustStore=/app/certs/status-server-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12

  status-server-3:
    image: status-server:local
    pull_policy: never
    depends_on:
      - postgres3
      - rabbitmq
    environment:
      APP_NODE_ID: node-3
      APP_PEER_BASE_URLS: https://status-server-1:8443,https://status-server-2:8443
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres3:5432/statusdb
      SPRING_DATASOURCE_USERNAME: statususer
      SPRING_DATASOURCE_PASSWORD: statuspass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5671
      JAVA_TOOL_OPTIONS: -Djavax.net.ssl.trustStore=/app/certs/status-server-truststore.p12 -Djavax.net.ssl.trustStorePassword=changeit -Djavax.net.ssl.trustStoreType=PKCS12

volumes:
  pgdata1:
  pgdata2:
  pgdata3:
