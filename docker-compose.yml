services:
  postgres1:
    image: postgres:16
    environment:
      POSTGRES_DB: statusdb
      POSTGRES_USER: statususer
      POSTGRES_PASSWORD: statuspass
    ports:
      - "5432:5432"
    volumes:
      - pgdata1:/var/lib/postgresql/data

  postgres2:
    image: postgres:16
    environment:
      POSTGRES_DB: statusdb
      POSTGRES_USER: statususer
      POSTGRES_PASSWORD: statuspass
    ports:
      - "5433:5432"
    volumes:
      - pgdata2:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  status-server-1:
    build: .
    depends_on:
      - postgres1
      - rabbitmq
    environment:
      APP_NODE_ID: node-1
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres1:5432/statusdb
      SPRING_DATASOURCE_USERNAME: statususer
      SPRING_DATASOURCE_PASSWORD: statuspass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    ports:
      - "8080:8080"

  status-server-2:
    build: .
    depends_on:
      - postgres2
      - rabbitmq
    environment:
      APP_NODE_ID: node-2
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres2:5432/statusdb
      SPRING_DATASOURCE_USERNAME: statususer
      SPRING_DATASOURCE_PASSWORD: statuspass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    ports:
      - "8081:8080"

volumes:
  pgdata1:
  pgdata2:
