events {
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream status_backend {
        least_conn;
        server status-server-1:8443 max_fails=1 fail_timeout=5s;
        server status-server-2:8443 max_fails=1 fail_timeout=5s;
        server status-server-3:8443 max_fails=1 fail_timeout=5s;
        keepalive 16;
    }

    server {
        listen 8440;
        server_name localhost;

        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
        }

        location / {
            proxy_pass https://status_backend;
            proxy_ssl_trusted_certificate /etc/nginx/status-server.crt;
            proxy_ssl_verify on;
            proxy_ssl_verify_depth 1;
            proxy_ssl_name status-server-1;
            proxy_ssl_server_name on;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 3s;
            proxy_connect_timeout 500ms;
            proxy_send_timeout 10s;
            proxy_read_timeout 60s;
        }
    }
}
