spring:
  application:
    name: status-server
  datasource:
    url: jdbc:postgresql://localhost:5432/statusdb
    username: statususer
    password: statuspass
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  rabbitmq:
    host: localhost
    port: 5671
    username: guest
    password: guest
    ssl:
      enabled: true
      trust-store: classpath:certs/rabbitmq-truststore.p12
      trust-store-password: changeit
      trust-store-type: PKCS12

server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:certs/status-server.p12
    key-store-password: changeit
    key-store-type: PKCS12

app:
  node-id: ${APP_NODE_ID:default-node}
  peer-base-urls: ${APP_PEER_BASE_URLS:}
  allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  bootstrap-timeout: 30s
  bootstrap-retry-delay: 2s
  bootstrap-require-peer: ${APP_BOOTSTRAP_REQUIRE_PEER:true}
